<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ML A to Z — Complete Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Clash+Display:wght@400;600;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04080f;
  --bg2:#080d18;
  --surface:#0c1220;
  --card:#101828;
  --border:#1a2540;
  --border2:#243050;
  --a1:#00d4ff;
  --a2:#0ea5e9;
  --a3:#38bdf8;
  --g1:#10b981;
  --g2:#34d399;
  --warn:#f59e0b;
  --danger:#ef4444;
  --text:#e8f4fd;
  --text2:#94aec8;
  --text3:#506480;
  --mono:'DM Mono',monospace;
  --display:'Clash Display','Instrument Sans',sans-serif;
  --body:'Instrument Sans',sans-serif;
  --easy-c:#10b981;--easy-bg:rgba(16,185,129,0.08);
  --med-c:#f59e0b;--med-bg:rgba(245,158,11,0.08);
  --hard-c:#ef4444;--hard-bg:rgba(239,68,68,0.08);
}
html{scroll-behavior:smooth}
body{font-family:var(--body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ANIMATED BG */
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);
  background-size:60px 60px;}
.bg-orb{position:fixed;border-radius:50%;filter:blur(120px);opacity:0.12;pointer-events:none;z-index:0}
.orb1{width:600px;height:600px;background:radial-gradient(#0ea5e9,transparent);top:-200px;right:-100px}
.orb2{width:400px;height:400px;background:radial-gradient(#10b981,transparent);bottom:-100px;left:-100px}

/* NAV */
nav{position:sticky;top:0;z-index:200;
  background:rgba(4,8,15,0.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;height:56px}
.logo{font-family:var(--display);font-size:1.15rem;font-weight:700;letter-spacing:-0.5px;
  background:linear-gradient(120deg,var(--a1),var(--g1));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-right{display:flex;align-items:center;gap:1.5rem}
.nav-stat{font-family:var(--mono);font-size:0.7rem;color:var(--text3);display:flex;align-items:center;gap:6px}
.nav-stat b{color:var(--a1)}
.nav-pill{background:var(--surface);border:1px solid var(--border2);border-radius:999px;
  padding:4px 14px;font-family:var(--mono);font-size:0.68rem;color:var(--text2);cursor:pointer;transition:.15s}
.nav-pill:hover{border-color:var(--a1);color:var(--a1)}

/* LAYOUT */
.layout{display:grid;grid-template-columns:270px 1fr;min-height:calc(100vh - 56px);position:relative;z-index:1}

/* SIDEBAR */
.sidebar{border-right:1px solid var(--border);background:var(--bg2);
  position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;
  padding:1rem 0 2rem}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sb-label{font-family:var(--mono);font-size:0.6rem;color:var(--text3);
  padding:0.75rem 1.25rem 0.3rem;letter-spacing:0.1em;text-transform:uppercase}

.mod-row{
  display:flex;align-items:center;gap:10px;
  padding:0.55rem 1.25rem;cursor:pointer;
  border:none;background:none;width:100%;text-align:left;
  border-left:2px solid transparent;transition:.15s;position:relative}
.mod-row:hover{background:rgba(0,212,255,0.04)}
.mod-row.active{background:rgba(0,212,255,0.06);border-left-color:var(--a1)}
.mod-icon{font-size:0.95rem;width:22px;text-align:center;flex-shrink:0}
.mod-label{flex:1;font-family:var(--body);font-size:0.82rem;font-weight:500;color:var(--text2);transition:.15s}
.mod-row.active .mod-label,.mod-row:hover .mod-label{color:var(--text)}
.mod-badge{font-family:var(--mono);font-size:0.62rem;color:var(--text3);
  background:var(--surface);border:1px solid var(--border);
  border-radius:999px;padding:1px 7px}
.mod-arrow{font-size:0.65rem;color:var(--text3);transition:.2s}
.mod-row.open .mod-arrow{transform:rotate(90deg);color:var(--a1)}

.sub-list{overflow:hidden;max-height:0;transition:max-height .25s ease}
.sub-list.open{max-height:600px}
.sub-btn{
  display:flex;align-items:center;gap:8px;
  padding:0.38rem 1.25rem 0.38rem 2.8rem;
  background:none;border:none;cursor:pointer;
  font-family:var(--body);font-size:0.76rem;color:var(--text3);
  width:100%;text-align:left;transition:.12s}
.sub-btn:hover{color:var(--a3)}
.sub-btn.active{color:var(--a1);font-weight:500}
.sub-dot{width:4px;height:4px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:.12s}
.sub-btn.active .sub-dot,.sub-btn:hover .sub-dot{background:var(--a1)}
.sub-q-count{font-family:var(--mono);font-size:0.6rem;margin-left:auto;color:var(--text3)}

/* MAIN */
.main{padding:2rem 2.5rem;min-width:0}

/* HOME */
.home-hero{margin-bottom:2.5rem}
.home-hero h1{font-family:var(--display);font-size:clamp(1.8rem,3vw,2.8rem);
  font-weight:700;letter-spacing:-1px;line-height:1.1}
.home-hero h1 em{font-style:normal;
  background:linear-gradient(120deg,var(--a1),var(--g1));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.home-hero p{color:var(--text2);margin-top:0.6rem;font-size:0.92rem;max-width:520px;line-height:1.6}

.overall-bar{margin-top:1.5rem;max-width:520px}
.bar-head{display:flex;justify-content:space-between;font-family:var(--mono);font-size:0.68rem;color:var(--text3);margin-bottom:6px}
.bar-head span{color:var(--a1)}
.bar-track{height:5px;background:var(--border);border-radius:999px}
.bar-fill{height:5px;border-radius:999px;background:linear-gradient(90deg,var(--a2),var(--g1));transition:width .6s}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:2rem}
.stat-card{background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:1rem;transition:.15s}
.stat-card:hover{border-color:var(--border2)}
.stat-card .sc-val{font-family:var(--display);font-size:1.6rem;font-weight:700;color:var(--text)}
.stat-card .sc-label{font-family:var(--mono);font-size:0.65rem;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}

.modules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:1.1rem;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,212,255,0.03),transparent);opacity:0;transition:.18s}
.mc:hover{border-color:var(--border2);transform:translateY(-2px)}
.mc:hover::before{opacity:1}
.mc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.6rem}
.mc-icon{font-size:1.5rem}
.mc-pct{font-family:var(--mono);font-size:0.65rem;color:var(--text3)}
.mc-name{font-family:var(--display);font-size:0.92rem;font-weight:600;color:var(--text);margin-bottom:2px}
.mc-sub{font-size:0.72rem;color:var(--text3);margin-bottom:10px}
.mc-bar{height:3px;background:var(--border);border-radius:999px;margin-bottom:6px}
.mc-fill{height:3px;border-radius:999px;background:linear-gradient(90deg,var(--a2),var(--g1))}
.mc-foot{display:flex;justify-content:space-between;font-family:var(--mono);font-size:0.62rem;color:var(--text3)}
.mc-foot b{color:var(--g1)}

/* TOPIC VIEW */
.breadcrumb{font-family:var(--mono);font-size:0.7rem;color:var(--text3);margin-bottom:1.5rem;display:flex;align-items:center;gap:8px}
.breadcrumb .bc-sep{color:var(--border2)}
.breadcrumb .bc-cur{color:var(--a1)}
.topic-head{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem}
.topic-title{font-family:var(--display);font-size:1.5rem;font-weight:700;letter-spacing:-.5px}
.topic-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.tag{font-family:var(--mono);font-size:0.65rem;padding:3px 10px;border-radius:999px;border:1px solid}
.tag.all{border-color:var(--a1);color:var(--a1)}
.tag.easy{border-color:var(--easy-c);color:var(--easy-c)}
.tag.med{border-color:var(--med-c);color:var(--med-c)}
.tag.hard{border-color:var(--hard-c);color:var(--hard-c)}

/* TABLE */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px}
table{width:100%;border-collapse:collapse;min-width:860px}
thead tr{background:var(--surface);border-bottom:1px solid var(--border)}
thead th{padding:.75rem 1rem;text-align:left;font-family:var(--mono);
  font-size:0.65rem;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:.1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(0,212,255,0.03)}
td{padding:.7rem 1rem;font-size:0.84rem;vertical-align:middle}

.q-num{font-family:var(--mono);font-size:0.65rem;color:var(--text3)}
.chk{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--border2);
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s}
.chk.done{background:var(--g1);border-color:var(--g1)}
.chk.done::after{content:'✓';color:#fff;font-size:9px;font-weight:700}
.q-name{font-weight:500;color:var(--text)}
.q-name.done{color:var(--text3);text-decoration:line-through}

.diff{font-family:var(--mono);font-size:0.63rem;font-weight:500;padding:2px 8px;border-radius:999px}
.diff.beginner{background:rgba(16,185,129,.1);color:var(--easy-c)}
.diff.intermediate{background:rgba(245,158,11,.1);color:var(--med-c)}
.diff.advanced{background:rgba(239,68,68,.1);color:var(--hard-c)}

.lnk{display:inline-flex;align-items:center;gap:4px;
  font-family:var(--mono);font-size:0.63rem;padding:3px 9px;
  border:1px solid var(--border2);border-radius:6px;color:var(--text3);
  text-decoration:none;transition:.13s;white-space:nowrap;cursor:pointer;background:none}
.lnk:hover{border-color:var(--a1);color:var(--a1)}
.lnk.yt:hover{border-color:#ff4040;color:#ff4040}
.lnk.art:hover{border-color:var(--g1);color:var(--g1)}
.links{display:flex;gap:5px;flex-wrap:wrap}

.empty{text-align:center;padding:5rem 2rem;color:var(--text3)}
.empty .e-ico{font-size:2.5rem;margin-bottom:1rem;opacity:.5}

@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .main{padding:1.5rem 1rem}
}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="layout">
<aside class="sidebar" id="sidebar"></aside>
<main class="main" id="main"></main>
</div>

/* =========================================================
   STATE
   ========================================================= */
let solved = JSON.parse(localStorage.getItem('ml-solved') || '{}');
let curMod = null, curSub = null, openMap = {};

function totalQs() { return Object.values(QS).reduce((a,v)=>a+v.length,0); }
function totalSolved() { return Object.keys(solved).filter(k=>solved[k]).length; }
function modTotal(mod) { return mod.subs.reduce((a,s)=>a+(QS[mod.id+'-'+s.id]||[]).length,0); }
function modSolved(mod) { return mod.subs.reduce((a,s)=>{
  const q=QS[mod.id+'-'+s.id]||[]; return a+q.filter(x=>solved[x.id]).length;
},0);}
function subCount(modId,subId){ return (QS[modId+'-'+subId]||[]).length; }

/* =========================================================
   RENDER SIDEBAR
   ========================================================= */
function renderSidebar(){
  let h='';
  h+='<div class="sb-label">Modules</div>';
  MODS.forEach(mod=>{
    const isOpen=openMap[mod.id], isActive=curMod===mod.id;
    h+=`<div>
      <button class="mod-row ${isActive?'active':''} ${isOpen?'open':''}" onclick="toggleMod('${mod.id}')">
        <span class="mod-icon">${mod.icon}</span>
        <span class="mod-label">${mod.name}</span>
        <span class="mod-badge">${modTotal(mod)}</span>
        <span class="mod-arrow">›</span>
      </button>
      <div class="sub-list ${isOpen?'open':''}">`;
    mod.subs.forEach(sub=>{
      const isSubA=curMod===mod.id&&curSub===sub.id;
      const cnt=subCount(mod.id,sub.id);
      h+=`<button class="sub-btn ${isSubA?'active':''}" onclick="selectSub('${mod.id}','${sub.id}')">
        <span class="sub-dot"></span>${sub.name}
        ${cnt?`<span class="sub-q-count">${cnt}</span>`:''}
      </button>`;
    });
    h+=`</div></div>`;
  });
  document.getElementById('sidebar').innerHTML=h;
}

/* =========================================================
   RENDER HOME
   ========================================================= */
function goHome(){ curMod=null; curSub=null; renderSidebar(); renderHome(); }
function renderHome(){
  const total=totalQs(), sol=totalSolved(), pct=total?Math.round((sol/total)*100):0;
  const begTotal=Object.values(QS).flat().filter(q=>q.d==='beginner').length;
  const intTotal=Object.values(QS).flat().filter(q=>q.d==='intermediate').length;
  const advTotal=Object.values(QS).flat().filter(q=>q.d==='advanced').length;
  document.getElementById('nt').textContent=total;
  document.getElementById('ns').textContent=sol;

  let h=`<div class="home-hero">
    <h1>Machine Learning <em>A to Z</em></h1>
    <p>Complete roadmap from math foundations to cutting-edge generative AI — ${MODS.length} modules, ${total} topics.</p>
    <div class="overall-bar">
      <div class="bar-head"><span>${sol} / ${total} completed</span><span>${pct}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="sc-val">${MODS.length}</div><div class="sc-label">Modules</div></div>
    <div class="stat-card"><div class="sc-val">${total}</div><div class="sc-label">Total Topics</div></div>
    <div class="stat-card"><div class="sc-val" style="color:var(--g1)">${sol}</div><div class="sc-label">Solved</div></div>
    <div class="stat-card"><div class="sc-val" style="color:var(--a1)">${pct}%</div><div class="sc-label">Progress</div></div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap">
    <span class="tag easy">Beginner ${begTotal}</span>
    <span class="tag med">Intermediate ${intTotal}</span>
    <span class="tag hard">Advanced ${advTotal}</span>
  </div>
  <div class="modules-grid">`;

  MODS.forEach(mod=>{
    const t=modTotal(mod), s=modSolved(mod), p=t?Math.round((s/t)*100):0;
    h+=`<div class="mc" onclick="selectMod('${mod.id}')">
      <div class="mc-top"><span class="mc-icon">${mod.icon}</span><span class="mc-pct">${p}%</span></div>
      <div class="mc-name">${mod.name}</div>
      <div class="mc-sub">${mod.subs.length} subtopics · ${t} topics</div>
      <div class="mc-bar"><div class="mc-fill" style="width:${p}%"></div></div>
      <div class="mc-foot"><span><b>${s}</b> / ${t}</span><span style="color:var(--text3)">${mod.subs.map(s=>s.name).slice(0,2).join(', ')}…</span></div>
    </div>`;
  });
  h+=`</div>`;
  document.getElementById('main').innerHTML=h;
}

/* =========================================================
   RENDER SUBTOPIC
   ========================================================= */
function renderSub(modId,subId){
  const mod=MODS.find(m=>m.id===modId);
  const sub=mod.subs.find(s=>s.id===subId);
  const qs=QS[modId+'-'+subId]||[];
  const beg=qs.filter(q=>q.d==='beginner').length;
  const int=qs.filter(q=>q.d==='intermediate').length;
  const adv=qs.filter(q=>q.d==='advanced').length;

  let h=`<div class="breadcrumb">
    <span style="cursor:pointer;color:var(--text2)" onclick="goHome()">Home</span>
    <span class="bc-sep">›</span>
    <span style="color:var(--text2)">${mod.name}</span>
    <span class="bc-sep">›</span>
    <span class="bc-cur">${sub.name}</span>
  </div>
  <div class="topic-head">
    <div>
      <div class="topic-title">${sub.name}</div>
      <div class="topic-tags">
        <span class="tag all">${qs.length} topics</span>
        ${beg?`<span class="tag easy">Beginner ${beg}</span>`:''}
        ${int?`<span class="tag med">Intermediate ${int}</span>`:''}
        ${adv?`<span class="tag hard">Advanced ${adv}</span>`:''}
      </div>
    </div>
  </div>`;

  if(!qs.length){
    h+=`<div class="empty"><div class="e-ico">📭</div><p>No topics added yet.</p></div>`;
  } else {
    h+=`<div class="tbl-wrap"><table>
      <thead><tr>
        <th style="width:32px">#</th>
        <th style="width:24px"></th>
        <th>Topic / Concept</th>
        <th style="width:100px">Level</th>
        <th>Resource</th>
        <th>Solution</th>
        <th>Explanation</th>
        <th>YouTube</th>
        <th>Article</th>
      </tr></thead>
      <tbody>`;
    qs.forEach((q,i)=>{
      const done=!!solved[q.id];
      h+=`<tr>
        <td class="q-num">${i+1}</td>
        <td><div class="chk ${done?'done':''}" onclick="toggleSolved(${q.id},this)"></div></td>
        <td><span class="q-name ${done?'done':''}">${q.n}</span></td>
        <td><span class="diff ${q.d}">${q.d}</span></td>
        <td><a class="lnk" href="${q.p}" target="_blank">↗ Open</a></td>
        <td><a class="lnk" href="${q.s}" target="_blank">{ } Code</a></td>
        <td><a class="lnk art" href="${q.e}" target="_blank">✦ Read</a></td>
        <td><a class="lnk yt" href="${q.y}" target="_blank">▶ Watch</a></td>
        <td><a class="lnk art" href="${q.a}" target="_blank">✦ Blog</a></td>
      </tr>`;
    });
    h+=`</tbody></table></div>`;
  }
  document.getElementById('main').innerHTML=h;
  document.getElementById('ns').textContent=totalSolved();
}

/* =========================================================
   INTERACTIONS
   ========================================================= */
function toggleSolved(id,el){
  solved[id]=!solved[id];
  localStorage.setItem('ml-solved',JSON.stringify(solved));
  el.classList.toggle('done');
  const nm=el.closest('tr').querySelector('.q-name');
  nm.classList.toggle('done',solved[id]);
  document.getElementById('ns').textContent=totalSolved();
}
function toggleMod(modId){
  openMap[modId]=!openMap[modId];
  if(openMap[modId]){
    curMod=modId;
    const mod=MODS.find(m=>m.id===modId);
    if(mod&&mod.subs.length){ selectSub(modId,mod.subs[0].id); return; }
  } else { curMod=null; curSub=null; }
  renderSidebar(); renderHome();
}
function selectMod(modId){
  openMap[modId]=true; curMod=modId;
  const mod=MODS.find(m=>m.id===modId);
  curSub=mod.subs[0].id;
  renderSidebar(); renderSub(modId,curSub);
}
function selectSub(modId,subId){
  curMod=modId; curSub=subId; openMap[modId]=true;
  renderSidebar(); renderSub(modId,subId);
}

/* INIT */
document.getElementById('nt').textContent=totalQs();
document.getElementById('ns').textContent=totalSolved();
renderSidebar(); renderHome();
</script>
